# Viet+ IME Configuration

input_method = "telex"
toggle_key = "space"
start_enabled = true
grab = true

[auto_restore]
enabled = true
trigger_keys = ["space", "escape"]

[app_state]
enabled = true
english_apps = [
    "code", "jetbrains", "intellij", "pycharm", "webstorm",
    "vim", "nvim", "kitty", "alacritty", "foot", "ghostty",
]
vietnamese_apps = [
    "telegram", "discord", "slack", "firefox", "chromium", "thunderbird",
]

[macros]
ko = "không"
kc = "không có"
"ko dc" = "không được"
dc = "được"
ng = "người"
nk = "như"
vs = "với"
lm = "làm"
rd = "rất"
bt = "biết"
